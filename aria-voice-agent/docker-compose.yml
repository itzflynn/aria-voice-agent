version: '3.9'

services:
  aria:
    build: .
    container_name: aria-voice-agent
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.aria.service=voice-agent"
      - "com.aria.version=1.0.0"

  # Optional: nginx reverse proxy with SSL termination
